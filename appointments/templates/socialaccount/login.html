{% extends "appointments/base.html" %}
{% load socialaccount %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center" style="min-height:80vh;">
  <div class="card shadow-lg p-4 text-center" style="max-width:400px; border-radius:15px;">

    <h3 class="mb-3">Continue with Google</h3>

    <p class="text-muted mb-4">
      You're about to sign in using your Google account.
    </p>

    <form method="post">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger w-100 py-2" style="border-radius:10px;">
        <i class="bi bi-google me-2"></i> Continue
      </button>
    </form>

    <hr>

    <a href="{% url 'login' %}" class="text-muted small">
      ← Back to login
    </a>

  </div>
</div>

{% endblock %}
